// Simple mail sender (internal use)
async function sendMail({ targetEmail, subject, body }) {
  try {
    if (!MAIL_WEBAPP_URL) throw new Error("MAIL_WEBAPP_URL 未設定");
    if (!targetEmail) throw new Error("targetEmail 為空，未寄信");

    // 使用 x-www-form-urlencoded 避免瀏覽器 CORS preflight（GitHub Pages 常見）
    const form = new URLSearchParams();
    form.append("key", MAIL_SECRET_KEY);
    form.append("targetEmail", targetEmail);
    form.append("subject", subject || "");
    form.append("body", body || "");

    // 逾時控制（避免一直轉圈/無回應）
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 12000);

    const r = await fetch(MAIL_WEBAPP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
      body: form.toString(),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    const t = await r.text();
    let j = null;
    try { j = JSON.parse(t); } catch {}

    if (!r.ok) throw new Error(`HTTP ${r.status}：${(t || "").slice(0, 200)}`);
    if (!j) throw new Error(`非 JSON 回應：${(t || "").slice(0, 200)}`);
    if (j.status !== "success") throw new Error(j.message || "寄信失敗");

    console.log("Mail sent:", j);
    return true;
  } catch (e) {
    const msg = (e && e.name === "AbortError") ? "寄信逾時（12 秒未回應），請稍後再試或檢查 Apps Script 部署/權限" : (e?.message || String(e));
    alert("寄信失敗：" + msg);
    console.warn("sendMail error:", e);
    return false;
  }
}


// --- DateTime formatter (for email timeline) ---
const fmtDT = (v) => {
  if (!v) return '—';
  try {
    const d = (typeof v === 'object' && v !== null && typeof v.toDate === 'function') ? v.toDate()
      : (typeof v === 'object' && v !== null && typeof v.seconds === 'number') ? new Date(v.seconds * 1000)
      : new Date(v);
    if (!d || isNaN(d.getTime())) return '—';
    return d.toLocaleString('zh-TW', { hour12: false });
  } catch {
    return '—';
  }
};

// --- ISO datetime formatter (remove 'T' and seconds) ---
const fmtISO = (s) => {
  if (!s) return '—';
  try {
    if (typeof s === 'string') return s.replace('T',' ').replace(/:\d\d(\.\d+)?$/, '').slice(0,16);
    return fmtDT(s);
  } catch {
    return '—';
  }
};

// 取得即時天氣（Open-Meteo，免 API key），每日更新並快取於 localStorage
async function fetchWeatherForLocations() {
  const todayKey = `weather_cache_${getLocalDateString()}`;
  try {
    const cached = localStorage.getItem(todayKey);
    if (cached) {
      const parsed = JSON.parse(cached);
      // 若快取是在離線/失敗時寫入，可能沒有 week 預報資料；此時忽略快取改為重新抓取
      const ok = Array.isArray(parsed) && parsed.length > 0 && parsed.every(x => Array.isArray(x?.week) && x.week.length > 0);
      if (ok) return parsed;
    }
  } catch {}

  const results = [];
  for (const loc of WEATHER_LOCATIONS) {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max&forecast_days=7&timezone=Asia%2FTaipei`;
      const r = await fetch(url);
      const j = await r.json();
      const temp = j?.current?.temperature_2m;
      const wind = j?.current?.wind_speed_10m;
      const curCode = j?.current?.weather_code;
      const rain = j?.daily?.precipitation_probability_max?.[0];
      const uv = j?.daily?.uv_index_max?.[0];

      const daily = j?.daily || {};
      const times = Array.isArray(daily.time) ? daily.time : [];
      const week = times.slice(0, 7).map((t, idx) => ({
        date: t,
        tmax: daily.temperature_2m_max?.[idx],
        tmin: daily.temperature_2m_min?.[idx],
        rain: daily.precipitation_probability_max?.[idx],
        uv: daily.uv_index_max?.[idx],
        code: daily.weather_code?.[idx],
      }));

      results.push({
        location: loc.location,
        temp: (typeof temp === 'number') ? `${Math.round(temp)}°C` : '—',
        wind: (typeof wind === 'number') ? `${Math.round(wind)} km/h` : '—',
        rain: (typeof rain === 'number') ? `${Math.round(rain)}%` : '—',
        uv: (typeof uv === 'number') ? `${Math.round(uv)}` : '—',
        week,
        _raw: { temp, wind, rain, uv, curCode }
      });
    } catch (e) {
      results.push({ location: loc.location, temp:'—', wind:'—', rain:'—', uv:'—', week: [], _raw:{} });
    }
  }

  try { localStorage.setItem(todayKey, JSON.stringify(results)); } catch {}
  return results;
}

// deterministic daily variation helper
const hashSeed = (s) => {
  let h = 2166136261;
  for (let i=0; i<s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return (h >>> 0);
};
const pickBySeed = (arr, seedStr) => {
  if (!arr || arr.length === 0) return '';
  const idx = hashSeed(String(seedStr)) % arr.length;
  return arr[idx];
};

// --- Overtime type canonicalization (legacy compatibility) ---
// 你指定的命名規則：
// - 新名稱：加班(補休)；舊名稱：加班申請(列計)、加班申請(補休) → 統一視為「加班(補休)」

const OVERTIME_COMP_TYPE = "加班(補休)";
var OVERTIME_COMP_TYPE_LEGACY = "加班申請(列計)"; // legacy: 舊名稱（列計）
var OVERTIME_COMP_TYPE_LEGACY2 = "加班申請(補休)"; // legacy: 舊名稱（補休）
// expose for safety
window.OVERTIME_COMP_TYPE_LEGACY = OVERTIME_COMP_TYPE_LEGACY;
const OVERTIME_COMP_LEGACY_TYPES = new Set(["加班申請(列計)", "加班申請(補休)", "加班(列計)"]);
const OVERTIME_PAY_TYPE = "加班(請款)";
const OVERTIME_PAY_LEGACY_TYPES = new Set(["加班申請(不列計)", "加班申請(請款)", "加班(不列計)"]);
const isOvertime = (t) => (t || "").includes("加班");

// 將資料庫/舊資料的字串正規化為「加班(補休)」或「加班(請款)」
const normalizeOvertimeType = (t) => {
  const x = (t || "").trim();
  if (!x) return x;
  if (OVERTIME_COMP_LEGACY_TYPES.has(x) || (x.includes("加班") && (x.includes("補休") || x.includes("補修") || x.includes("列計")) && !x.includes("不列計") && !x.includes("請款"))) {
    return OVERTIME_COMP_TYPE;
  }
  if (OVERTIME_PAY_LEGACY_TYPES.has(x) || (x.includes("加班") && (x.includes("不列計") || x.includes("請款")))) {
    return OVERTIME_PAY_TYPE;
  }
  return x;
};

// 判斷是否屬於「加班(補休)」或「加班(請款)」

const LEAVE_SELECT_PRIORITY = ["特休","榮譽假","加班(請款)","加班(補休)","補休"];
const sortLeaveTypesForSelect = (arr=[]) => {
  const list = Array.isArray(arr) ? [...arr] : [];
  const rank = (name) => {
    const i = LEAVE_SELECT_PRIORITY.indexOf((name||"").trim());
    return i === -1 ? 999 : i;
  };
  return list.sort((a,b)=>{
    const ra = rank(a?.name);
    const rb = rank(b?.name);
    if (ra !== rb) return ra - rb;
    // 同優先序：先個人再公務，然後名稱排序
    const ca = (a?.category||"");
    const cb = (b?.category||"");
    if (ca !== cb) return ca.localeCompare(cb, 'zh-Hant');
    return String(a?.name||"").localeCompare(String(b?.name||""), 'zh-Hant');
  });
};

  } catch { return ''; }
};

// --- Helper: Effective leave hours for stats ---
// 用於假別統計：同日先依起訖時間重算（扣午休），其餘再回退到儲存 hours 或日期區間推算
const getEffectiveLeaveHours = (l) => {
  try {
    const startText = String(l?.start || '').trim();
    const endText = String(l?.end || l?.start || '').trim();
    const sd = new Date(startText);
    const ed = new Date(endText);

    // 同日資料優先依起訖時間重算（扣午休 12:00-13:00），避免舊資料 hours 殘值造成誤差
    if (Number.isFinite(sd.getTime()) && Number.isFinite(ed.getTime()) && ed > sd) {
      const ds = startText.split('T')[0];
      const de = endText.split('T')[0];
      if (ds && de && ds === de) {
        let h = (ed.getTime() - sd.getTime()) / 36e5;
        const lunchS = new Date(`${ds}T12:00`);
        const lunchE = new Date(`${ds}T13:00`);
        const lunchOverlap = Math.max(0, Math.min(ed.getTime(), lunchE.getTime()) - Math.max(sd.getTime(), lunchS.getTime()));
        h -= lunchOverlap / 36e5;
        h = Math.max(0, Math.min(8, h));
        if (h > 0) return Math.round(h * 10) / 10;
      }
    }

    const h = Number(l?.hours);
    if (Number.isFinite(h) && h > 0) return h;

    const s = String(l?.start || '').split('T')[0];
    const e = String(l?.end || '').split('T')[0];
    if (!s || !e) return 0;
    if (s === e) return 0;

    const dayStart = new Date(s + 'T00:00');
    const dayEnd = new Date(e + 'T00:00');
    if (isNaN(dayStart.getTime()) || isNaN(dayEnd.getTime()) || dayEnd < dayStart) return 0;

    let cur = new Date(dayStart);
    let workDays = 0;
    let guard = 0;
    while (cur <= dayEnd && guard < 800) {
      const ds = getLocalDateString(cur);
      const day = cur.getDay(); // 0 Sun, 6 Sat
      const isWeekend = (day === 0 || day === 6);
      const isHoliday = !!(globalThis.HOLIDAYS && globalThis.HOLIDAYS[ds]);
      if (!isWeekend && !isHoliday) workDays += 1;
      cur.setDate(cur.getDate() + 1);
      guard++;
    }
    return workDays * 8;
  } catch {
    return Number(l?.hours || 0) || 0;
  }
};

// 讓「外框顏色」同時決定「背景顏色」（背景改為加白後的淺色，不用透明度，避免濁感）
const hexToTint = (hex, whiteness = 0.82) => {
  try {
    const h = String(hex || '').replace('#','').trim();
    if (h.length !== 6) return 'rgb(245,247,250)';
    const r = parseInt(h.slice(0,2), 16);
    const g = parseInt(h.slice(2,4), 16);
    const b = parseInt(h.slice(4,6), 16);
    if ([r,g,b].some(v => Number.isNaN(v))) return 'rgb(245,247,250)';
    const w = Math.max(0, Math.min(1, Number(whiteness)));
    const rr = Math.round(r + (255 - r) * w);
    const gg = Math.round(g + (255 - g) * w);
    const bb = Math.round(b + (255 - b) * w);
    return `rgb(${rr},${gg},${bb})`;
  } catch {
    return 'rgb(245,247,250)';
  }
};

  });

  const today = getLocalDateString(new Date());
  const items = Object.values(groups)
    .filter(g => g.tag && (!g.people || g.people.length === 0))

  return { count: Object.values(groups).filter(g => g.tag && (!g.people || g.people.length === 0) && (g.tag.date || '') >= today).length, items };
}, [calendarEvents]);

useEffect(() => {

if (loading) return (

const totalAlert = pendingApprovalCount + myPendingDeputy;

<div className="md:hidden bg-white p-4 shadow-sm flex items-center justify-between border-b">

{view === 'accounting' && <AccountingStatsView users={usersList} leaves={leaves} leaveTypes={leaveTypes} currentUser={userData} />}

{view === 'members' && <MembersView db={db} users={usersList} currentUser={userData} roleNames={roleNames} />}
{view === 'database' && <DatabaseAdminView events={calendarEvents} leaves={leaves} users={usersList} crud={crud} db={db} />}
{view === 'settings' && <SettingsView settings={settings} user={userData} tags={{workTags, areaTags, handleAddTag, handleDeleteTag, handleUpdateTag}} leaveTypes={leaveTypes} handleManageLeaveTypes={handleManageLeaveTypes} onSave={handleUpdateSettings} onProfileSave={handleUpdateProfile} roleNames={roleNames} onUpdateRoleNames={handleUpdateRoleNames} />}
{view === 'profile' && <ProfileView user={userData} onSave={handleUpdateProfile} roleNames={roleNames} />}</main></div></div>);}
// --- Sub-Components ---
function Dashboard({ user, leaves, calendarEvents, setView, leaveTypes }) {
const [weeksToShow, setWeeksToShow] = useState(1);
const [weatherData, setWeatherData] = useState([]);
const [expandedWeatherIdx, setExpandedWeatherIdx] = useState(null);
useEffect(() => {
  let alive = true;
  fetchWeatherForLocations().then(d => { if (alive) setWeatherData(d || []); });
  return () => { alive = false; };
}, []);
const weatherList = (weatherData && weatherData.length) ? weatherData : WEATHER_LOCATIONS.map(l => ({ location: l.location, temp: '—', wind: '—', rain: '—', uv: '—', _raw: {} }));
const today = new Date();
const weekDays = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
const todayStr = getLocalDateString(today);
const myDeputyPendingCount = leaves.filter(l => (l.deputyId === user.uid || l.deputyId === user.docId || String(l.deputyId||'').toLowerCase() === (user.email||'').toLowerCase()) && l.status === 'pending').length;
const teamDeputyPendingCount = (user.role === 'leader' || user.role === 'admin') ? leaves.filter(l => l.status === 'pending' && !!l.deputyId).length : 0;
const teamLeaderPendingCount = (user.role === 'leader' || user.role === 'admin') ? leaves.filter(l => l.status === 'deputy_signed').length : 0;
const myPendingCount = leaves.filter(l => ((l.requesterId === user.uid || l.requesterId === user.docId || l.requesterUid === user.uid || l.requesterDocId === user.docId) && (l.status === 'pending' || l.status === 'deputy_signed'))).length;
const personalLeaveTypeNames = leaveTypes.filter(t => t.category === 'personal').map(t => t.name);
const todayLeavesDetails = leaves.filter(l => l.start.startsWith(todayStr) && l.status === 'approved' && personalLeaveTypeNames.includes(l.type)).map(l => {
const timeStr = l.hours >= 8 ? '整天' : (l.start.includes('T08') || l.start.includes('T09') ? '上午' : '下午');
return `${l.requesterName}(${timeStr})`;
});
const todayExternalDetails = [];
calendarEvents.filter(e => e.date === todayStr && e.type === 'person').forEach(p => {
const tagEv = calendarEvents.find(t => t.groupId === p.groupId && t.type === 'tag');
if (tagEv && EXTERNAL_WORK_TAGS.includes(tagEv.item)) {
const s = p.slot === 'morning' ? '上午' : (p.slot === 'afternoon' ? '下午' : '整天');
todayExternalDetails.push(`${p.userName}(${s})`);}
});
const uniqueExternalDetails = [...new Set(todayExternalDetails)];
const getWeekData = () => {
const start = new Date(today);
start.setDate(today.getDate() - today.getDay() + 1);
const week = [];
const totalDays = weeksToShow * 7;
for(let i=0; i<totalDays; i++) {
const d = new Date(start);
d.setDate(start.getDate() + i);
if (d.getDay() === 0 || d.getDay() === 6) continue;
const dStr = getLocalDateString(d);
// 依 groupId 分組，收集工作項、時間、人員
const groupMap = {};
calendarEvents.filter(e => e.date === dStr).forEach(e => {
  if (!groupMap[e.groupId]) groupMap[e.groupId] = { tag: null, people: [] };
  if (e.type === 'tag') groupMap[e.groupId].tag = e;
  else if (e.type === 'person') groupMap[e.groupId].people.push(e);
});
const externalGroups = Object.values(groupMap)
  .filter(g => g.tag && EXTERNAL_WORK_TAGS.includes(g.tag.item))
  .map(g => {
    const slot = g.tag.slot || 'all_day';
    const startTime = g.tag.startTime || (slot === 'morning' ? '08:00' : slot === 'afternoon' ? '13:00' : '08:00');
    const endTime = g.tag.endTime || (slot === 'morning' ? '12:00' : slot === 'afternoon' ? '17:00' : '17:00');
    const areas = Array.isArray(g.tag.area) ? g.tag.area : (g.tag.area ? [g.tag.area] : []);
    return {
      workItem: g.tag.item,
      slot,
      startTime,
      endTime,
      areas,
      people: [...new Set(g.people.map(p => p.userName))],
    };
  })
  .sort((a, b) => a.startTime.localeCompare(b.startTime));
// 收集當日休假人員（含時段）
const leavePersonnel = (leaves || [])
  .filter(l => {
    if (l.status !== 'approved') return false;
    if (!personalLeaveTypeNames.includes(l.type)) return false;
    const startDate = String(l.start || '').slice(0, 10);
    const endDate = String(l.end || l.start || '').slice(0, 10);
    return startDate <= dStr && dStr <= endDate;
  })
  .map(l => {
    const hrs = Number(l.hours || 0);
    const period = hrs >= 8 ? '整天' : (String(l.start || '').includes('T08') || String(l.start || '').includes('T09') ? '上午' : '下午');
    return { name: l.requesterName, period };
  });
week.push({ day: weekDays[d.getDay()], date: dStr, externalGroups, leavePersonnel });}
return week;
};
const weekData = getWeekData();

const hour = today.getHours();
const todayKey = getLocalDateString(today);
// 依時段與日期做「每日有變化」的問候語（同一天同時段保持一致）
const greetingPool = {
  morning: [
    { t: "早安！一日之計在於晨", i: "☀️" },
    { t: "早安～先把最重要的一件事搞定", i: "☀️" },
    { t: "早安！今天就用順手的節奏開場", i: "🌤️" },
    { t: "早安！先喝口水、呼吸一下，再出發", i: "💧" },
    { t: "早安！把今天當成一次小升級", i: "🚀" },
  ],
  noon: [
    { t: "午安！記得好好吃頓午餐喔", i: "🍱" },
    { t: "午安～補充能量，下午才有力氣", i: "🥣" },
    { t: "午安！午休 10 分鐘也很有用", i: "🧘" },
    { t: "午安！吃飽後先把最急的處理掉", i: "📌" },
  ],
  afternoon: [
    { t: "下午好！喝杯茶提提神，繼續加油", i: "☕️" },
    { t: "下午好～把大任務切小塊會更順", i: "🧩" },
    { t: "下午好！先清一個待辦，成就感馬上來", i: "✅" },
    { t: "下午好！保持節奏，比拼命更有效", i: "🎯" },
  ],
  evening: [
    { t: "晚安！今天也辛苦了，好好休息", i: "🌙" },
    { t: "晚安～把明天的第一步先想好就好", i: "🗒️" },
    { t: "晚安！收尾 5 分鐘，明天省 30 分鐘", i: "⏱️" },
    { t: "晚安～今天做到這裡已經很可以了", i: "🌙" },
  ],
  late: [
    { t: "夜深了，還在忙嗎？要注意休息喔", i: "🦉" },
    { t: "夜深了～先存檔，明天再處理也行", i: "💾" },
    { t: "夜深了！如果卡住，先睡一覺常常更快", i: "😴" },
    { t: "夜深了～明天的你會感謝現在去睡的你", i: "🛌" },
  ],
};
const slotKey =
  (hour >= 5 && hour < 12) ? "morning" :
  (hour >= 12 && hour < 14) ? "noon" :
  (hour >= 14 && hour < 18) ? "afternoon" :
  (hour >= 18 && hour < 22) ? "evening" : "late";

const picked = pickBySeed(greetingPool[slotKey], `${todayKey}_${slotKey}`);
const greeting = picked?.t || "哈囉！";
const greetingIcon = picked?.i || "👋";
return (
<div className="space-y-6 max-w-5xl mx-auto">
<div className="bg-white p-6 rounded-lg shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
<div>
<h2 className="text-2xl font-bold text-gray-800">{user.name}，{greeting} {greetingIcon}</h2>
<p className="text-sm text-gray-500 font-medium">{today.getFullYear()}/{today.getMonth()+1}/{today.getDate()} ({weekDays[today.getDay()]})</p></div>
<div className="flex gap-3 overflow-x-auto w-full md:w-auto pb-2">
{weatherList.map((w,i)=>(
<div key={i} onClick={() => setExpandedWeatherIdx(expandedWeatherIdx===i ? null : i)} className="min-w-[110px] bg-gray-50 p-3 rounded-xl flex flex-col items-center border border-gray-100 shadow-sm cursor-pointer hover:bg-gray-100 transition">
<div className="flex items-center gap-2 mb-1">

const getGoogleCalendarToken = async () => {

      p.setCustomParameters({
        login_hint: String(user?.email || auth.currentUser?.email || '')
      });
    }
    return p;
  };

  let lastErr = null;
  const tries = [createProvider(true), createProvider(false)];
  for (const provider of tries) {
    try {
      const result = await signInWithPopup(auth, provider);
      const credential = GoogleAuthProvider.credentialFromResult(result);
      const accessToken = credential?.accessToken;
      if (!accessToken) throw new Error('無法取得 Google Calendar 存取權杖，請重新授權後再試。');
      return accessToken;
    } catch (err) {
      lastErr = err;
      const code = String(err?.code || '');
      // 針對常見彈窗/網路類錯誤做一次重試
      if (!['auth/network-request-failed', 'auth/popup-blocked', 'auth/popup-closed-by-user', 'auth/cancelled-popup-request'].includes(code)) {

  const code = String(lastErr?.code || '');
  if (code === 'auth/network-request-failed') {

  }
  if (code === 'auth/popup-closed-by-user') {
    throw new Error('你已關閉 Google 授權視窗，請重新點選同步。');
  }
  throw new Error(lastErr?.message || 'Google 授權失敗，請稍後再試。');

const mapAreaClassToGoogleColorId = (areaClass) => {

  if (!txt) return '';
  if (txt.includes('red')) return '11';
  if (txt.includes('orange')) return '6';
  if (txt.includes('yellow')) return '5';
  if (txt.includes('green')) return '10';
  if (txt.includes('blue')) return '7';
  if (txt.includes('purple')) return '3';
  if (txt.includes('pink')) return '4';
  if (txt.includes('gray')) return '8';
  return '';
};

const hexToGoogleColorId = (hex) => {
  const s = String(hex || '').trim();
  const m = s.match(/^#?([a-fA-F0-9]{6})$/);
  if (!m) return '';
  const n = m[1];
  const r = parseInt(n.slice(0, 2), 16) / 255;
  const g = parseInt(n.slice(2, 4), 16) / 255;
  const b = parseInt(n.slice(4, 6), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
    if (h < 0) h += 360;
  }
  const sat = max === 0 ? 0 : d / max;
  if (sat < 0.12) return '8';
  if (h < 15 || h >= 345) return '11';
  if (h < 45) return '6';
  if (h < 70) return '5';
  if (h < 160) return '10';
  if (h < 210) return '7';
  if (h < 250) return '9';
  if (h < 300) return '3';
  return '4';
};

const toGoogleDateTime = (isoLike, fallbackTime = '08:00') => {

  if (!txt.includes('T')) return `${txt}T${fallbackTime}:00`;
  const [d, tRaw] = txt.split('T');
  const t = String(tRaw || '').slice(0, 5);
  const hhmm = /^\d{2}:\d{2}$/.test(t) ? t : fallbackTime;
  return `${d}T${hhmm}:00`;
};

const extractSyncedKey = (gEvent) => {
  const extSyncKey = String(gEvent?.extendedProperties?.private?.kpptSyncKey || '').trim();
  if (extSyncKey) return extSyncKey;

  const extGroupId = String(gEvent?.extendedProperties?.private?.kpptGroupId || '').trim();
  if (extGroupId) return `group:${extGroupId}`;

  const desc = String(gEvent?.description || '');
  const hitSync = desc.match(/\[KPPT-SYNC:([^\]]+)\]/);
  if (hitSync?.[1]) return String(hitSync[1]).trim();

  const hitGroup = desc.match(/\[KPPT-GID:([^\]]+)\]/);
  if (hitGroup?.[1]) return `group:${String(hitGroup[1]).trim()}`;

  return '';
};
const fetchGoogleMonthEvents = async (token, calendarId, startIso, endIso) => {
  const params = new URLSearchParams();
  params.set('timeMin', startIso);
  params.set('timeMax', endIso);
  params.set('singleEvents', 'true');
  params.set('maxResults', '2500');
  params.set('orderBy', 'startTime');
  params.append('privateExtendedProperty', `kpptSource=${GCAL_SYNC_SOURCE}`);

  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?${params.toString()}`;
  const resp = await fetch(url, {
    method: 'GET',
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`讀取 Google 日曆失敗 (${resp.status})：${txt || 'unknown error'}`);
  }
  const data = await resp.json();
  return Array.isArray(data?.items) ? data.items : [];
};

const upsertGoogleEvent = async (token, calendarId, existingEventId, payload) => {
  const isUpdate = !!existingEventId;
  const url = isUpdate
    ? `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events/${encodeURIComponent(existingEventId)}`
    : `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`;

  const resp = await fetch(url, {
    method: isUpdate ? 'PATCH' : 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });

  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`${isUpdate ? '更新' : '建立'} Google 事件失敗 (${resp.status})：${txt || 'unknown error'}`);
  }

  return resp.json();
};

const isSyncItemOwnedByCurrentUser = (item) => {
  const myName = String(user?.name || '').trim();
  const myEmail = String(user?.email || '').trim();
  const myKeys = new Set([
    String(user?.uid || '').trim(),
    String(user?.docId || '').trim(),
    myName,
    myEmail
  ].filter(Boolean));
  if (item?.kind === 'group') {
    const people = Array.isArray(item?.group?.people) ? item.group.people : [];
    return people.some(p => {
      const pid = String(p?.userId || '').trim();
      const pname = String(p?.userName || '').trim();
      return (pid && myKeys.has(pid)) || (pname && myKeys.has(pname));
    });
  }
  if (item?.kind === 'leave') {
    const rid = String(item?.leave?.requesterId || '').trim();
    const rname = String(item?.leave?.requesterName || '').trim();
    const remail = String(item?.leave?.requesterEmail || '').trim();
    return (rid && myKeys.has(rid)) || (rname && myKeys.has(rname)) || (remail && myKeys.has(remail));
  }
  if (item?.kind === 'important') {
    const ownerIds = getImportantOwnerIdsForSync(item?.important);
    if (!ownerIds.length) return true;
    if (ownerIds.includes('ALL')) return true;
    return ownerIds.some(x => myKeys.has(String(x || '').trim()));
  }
  return false;
};
const handleSyncGoogleCalendar = async (targetType = 'both') => {
  if (isSyncingGoogle) return;
  if (!auth?.currentUser) {
    alert('請先登入 Google 帳號後再同步。');
    return;
  }

  const allTargets = monthSyncItems;
  const ownedTargets = allTargets.filter(isSyncItemOwnedByCurrentUser);

  const jobs = [];
  const wantsPersonal = targetType === 'personal' || targetType === 'both';
  const wantsShared = targetType === 'shared' || targetType === 'both';

  if (wantsPersonal) {
    const pid = String(personalCalendarId || '').trim();
    if (!pid) {
      alert('請先到個人設定填寫「個人 Google 日曆 ID」(可填 primary)。');
      return;
    }
    jobs.push({ key: 'personal', label: '個人 Google 日曆', calendarId: pid, targets: ownedTargets });
  }

  if (wantsShared) {
    const sid = String(sharedCalendarId || '').trim();
    if (!sid) {
      if (targetType === 'shared') {
        alert('請先由管理員到系統設定填寫「共用 Google 日曆 ID」。');
        return;
      }
    } else {
      jobs.push({ key: 'shared', label: '共用 Google 日曆', calendarId: sid, targets: allTargets });
    }
  }

  if (!jobs.length) {
    alert('找不到可同步目標，請先確認日曆 ID 設定。');
    return;
  }

  const hasAnyData = jobs.some(j => (j.targets || []).length > 0);
  if (!hasAnyData) {
    alert('此月份沒有可同步的排班/假單/公告資料。');
    return;
  }

  const win = getMonthWindow(date);
  const previewLines = jobs.map(j => {
    const gc = (j.targets || []).filter(x => x.kind === 'group').length;
    const lc = (j.targets || []).filter(x => x.kind === 'leave').length;
    const ic = (j.targets || []).filter(x => x.kind === 'important').length;
    return `${j.label}：排班 ${gc} 筆 + 假單 ${lc} 筆 + 公告 ${ic} 筆`;
  });
  const ok = confirm(`將同步 ${win.label} 月資料到 Google 日曆：\n${previewLines.join('\n')}\n是否繼續？`);
  if (!ok) return;

  setIsSyncingGoogle(true);
  try {
    const token = await getGoogleCalendarToken();
    const resultLines = [];

    for (const job of jobs) {
      const targets = Array.isArray(job.targets) ? job.targets : [];
      if (!targets.length) {
        resultLines.push(`${job.label}：無可同步資料`);
        continue;
      }

      const existingEvents = await fetchGoogleMonthEvents(token, job.calendarId, win.startIso, win.endIso);
      const existingMap = new Map();
      (existingEvents || []).forEach(ev => {
        const key = extractSyncedKey(ev);
        if (key && ev?.id && !existingMap.has(key)) existingMap.set(key, ev.id);
      });

      let created = 0;
      let updated = 0;
      let skipped = 0;
      let createdGroup = 0;
      let updatedGroup = 0;
      let createdLeave = 0;
      let updatedLeave = 0;
      let createdImportant = 0;
      let updatedImportant = 0;

      for (const item of targets) {
        let payload = null;
        if (item.kind === 'group') payload = toGoogleCalendarPayload(item.group);
        if (item.kind === 'leave') payload = toGoogleLeavePayload(item.leave);
        if (item.kind === 'important') payload = toGoogleImportantPayload(item.important);
        if (!payload) { skipped += 1; continue; }

        const existingId = existingMap.get(String(item.syncKey || ''));
        await upsertGoogleEvent(token, job.calendarId, existingId, payload);

        if (existingId) {
          updated += 1;
          if (item.kind === 'group') updatedGroup += 1;
          if (item.kind === 'leave') updatedLeave += 1;
          if (item.kind === 'important') updatedImportant += 1;
        } else {
          created += 1;
          if (item.kind === 'group') createdGroup += 1;
          if (item.kind === 'leave') createdLeave += 1;
          if (item.kind === 'important') createdImportant += 1;
        }
      }

      resultLines.push(`${job.label}：排班 新增 ${createdGroup} / 更新 ${updatedGroup}，假單 新增 ${createdLeave} / 更新 ${updatedLeave}，公告 新增 ${createdImportant} / 更新 ${updatedImportant}${skipped ? `，略過 ${skipped}` : ''}，總計 新增 ${created} / 更新 ${updated}`);
    }

    alert(`Google 日曆同步完成\n${resultLines.join('\n')}`);
  } catch (e) {
    console.error(e);
    alert(`Google 日曆同步失敗：${e?.message || e || '請稍後再試'}`);
  } finally {
    setIsSyncingGoogle(false);
  }
};

};

const handleEditResubmit = async () => {
  if (!editTarget) { alert("找不到可重送的假單資料，請重新操作。"); return; }
  const start = editForm.start;
  const end = editForm.end;
  const hours = Number(editForm.hours || 0);
  if (!editForm.type) { alert('請選擇假別'); return; }
  if (!start || !end) { alert('請選擇開始與結束時間'); return; }
  if (hours <= 0) { alert('時數必須大於 0'); return; }
  const isOvertimeReq = isOvertime(editForm.type);
  if (!isOvertimeReq && hasDeputyConflictLite(editForm.deputyId, start, end, editTarget.id)) {
    alert('【職代防呆】所選職代於該時段已安排請假/審核中，請更換人員。');
    return;
  }
  if (!confirm('確定要以修改後內容重新送出嗎？')) return;

  setEditSubmitting(true);
  try {
    await crud.updateLeave(editTarget.id, {
      type: editForm.type,
      start,
      end,
      hours,
      reason: editForm.reason || '',
      deputyId: isOvertimeReq ? '' : (editForm.deputyId || ''),
      // 重新送審：依假別決定是否需要職代
      status: isOvertimeReq ? 'deputy_signed' : 'pending',
      deputySignedAt: isOvertimeReq ? new Date() : null,
      deputySignedBy: isOvertimeReq ? 'EXEMPT' : null,
      deputySignedByName: isOvertimeReq ? '加班免簽' : null,
      approverId: null,
      approvalDate: null,
      resubmittedAt: new Date()
    });
    alert('已更新內容並重新送審！');
    setEditOpen(false);
    setEditTarget(null);
  } catch (e) {
    alert('更新失敗: ' + (e?.message || e));
  } finally {
    setEditSubmitting(false);
  }
};

const handleDeleteLeave = async (leaveObj) => {
  if (!leaveObj) return;
  if (leaveObj.status === 'approved') {
    alert('此假單已核准，為避免紀錄遺失，不提供刪除。若需調整請使用「修改後重新送出」。');
    return;
  }
  if (!confirm('確定要刪除此筆請假申請嗎？刪除後將無法復原。')) return;
  try {
    await crud.deleteLeave(leaveObj.id);
    alert('已刪除申請。');
  } catch (e) {
    alert('刪除失敗: ' + (e?.message || e));
  }
};


return (

            </select>
          </div>

                <option key={u.docId || u.uid} value={u.docId || u.uid}>{u.name}</option>
              ))}
            </select>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">

          </div>

        <div className="text-xs text-gray-500 bg-amber-50 border border-amber-100 rounded-lg p-3">
          提醒：此動作會清除前次簽核狀態，並以「待審」重新送出；通知信仍只會在最終核准時寄出。
        </div>
      </div>

      <div className="px-5 py-4 border-t flex items-center justify-end gap-2 bg-gray-50">
        <button disabled={editSubmitting} className="px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 text-gray-700 font-bold" onClick={()=>{ if(!editSubmitting){ setEditOpen(false); setEditTarget(null);} }}>取消</button>
        <button disabled={editSubmitting} className="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-black flex items-center gap-2" onClick={handleEditResubmit}>
          {editSubmitting ? <Loader2 className="animate-spin" size={18}/> : <Check size={18}/>}
          重新送出
        </button>
      </div>
    </div>
  </div>
)}

{displayRows.map((r) => {

return (<>

<span className={`inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold whitespace-nowrap break-keep ${isOfficial ? 'bg-sky-100 text-sky-700' : 'bg-orange-100 text-orange-700'}`}>
{r.leaveType}</span>
: <span className="text-gray-400">-</span>}</td>
<td className="p-4 text-sm font-medium text-gray-700">{r.leaveHours}</td>
<td className="p-4 text-sm text-blue-700 whitespace-nowrap">{deputyName}</td>
<td className="p-4 text-sm text-gray-600 max-w-[150px] truncate" title={r.reason}>{r.reason}</td>
<td className="p-4 text-sm text-gray-500 max-w-[150px] truncate" title={r.note}>{r.note}</td>

<span className={`inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold leading-tight whitespace-nowrap ${r.status === '缺公務單' ? 'bg-red-100 text-red-700' : r.status === '異常公出' || ['假別不符', '已駁回', '已撤銷'].includes(r.status) ? 'bg-amber-100 text-amber-700' : ['待職代審查中', '組長審查中'].includes(r.status) ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700'}`}>
{r.status === '異常公出' ? '異常公出 (請確認日曆人員)' : r.status}</span></td>

{filteredRows.length === 0 && <tr><td colSpan="11" className="p-8 text-center text-gray-400">尚無符合條件的出勤資料</td></tr>}</tbody></table></div>
) : (

const PendingLeaveCard = ({ task, leaveTypes, deputies, onSubmit, isSubmitting }) => {
const officialTypes = leaveTypes.filter(t => t.category === 'official');

const [type, setType] = useState(officialTypes.length > 0 ? officialTypes[0].name : '');
const [deputyId, setDeputyId] = useState('');
const selectedTypeDesc = officialTypes.find(t => t.name === type)?.desc || '';
const handleSend = () => {
  const skipDeputy = isOvertime(type);
  if(!skipDeputy && !deputyId) { alert("請選擇職務代理人"); return; }
  const h = Number(task.hours || 0);
  if (!(h > 0)) { alert("缺少有效時數，請回排班日曆檢查起訖時間設定。"); return; }

    alert(`特休額度不足！\n本年度額度：${entitled} 小時\n已使用：${used} 小時\n可用餘額：${balance} 小時\n您申請：${need} 小時\n\n（提示：事假不受此限制）`);
    return false;
  } catch { return true; }
};
const showSubmitError = (msg) => {
  const text = String(msg || '送出失敗，請檢查欄位');
  setSubmitSuccess('');
  setSubmitError(text);
  alert(text);
};
const getLeaveStatusLabel = (status) => {
  const map = {
    pending: '待職代審查',
    deputy_signed: '待主管核准',
    approved: '已核准',
    rejected: '已退回',
    withdrawn: '已作廢',
    recalled: '已撤回'
  };
  return map[String(status || '')] || String(status || '');
};
const fmtDaysHoursText = (h) => {
  const n = Number(h || 0);
  if (!isFinite(n) || n <= 0) return '0天 + 0小時';
  const d = Math.floor(n / 8);
  const rh = Math.round((n - d * 8) * 10) / 10;
  return d + '天 + ' + rh + '小時';
};
const handleTaskSubmit = async (taskData, taskId) => {
  setSubmitSuccess('');
  setSubmitError('');
  // 第一區塊（排班日曆）送出：改為先跳確認視窗
  setSubmittingTaskId(taskId);
  try {
    const now = new Date();
    const isOt = isOvertime(taskData.type);
    const skipDeputy = !!taskData.skipDeputy || isOt;
    if(!skipDeputy && hasDeputyConflict(taskData.deputyId, taskData.start, taskData.end)){
      const hit = getDeputyConflict(taskData.deputyId, taskData.start, taskData.end);
      const detail = hit ? `\n衝突資料：${hit.title}\n衝突時段：${hit.timeText}${hit.status ? `\n狀態：${hit.status}` : ''}` : '';
      showSubmitError(`職務代理人時段衝突，請改選其他人員。${detail}`);
      setSubmittingTaskId(null);
      return;
    }
    if(!skipDeputy && !taskData.deputyId){
      showSubmitError('請先選擇職務代理人。');
      setSubmittingTaskId(null);
      return;
    }
    if(!taskData.start || !taskData.end){ showSubmitError('缺少起訖時間，請回排班日曆重新儲存該筆行程。'); setSubmittingTaskId(null); return; }
    const recomputeTaskHours = (() => {
      const s = new Date(taskData.start);
      const e = new Date(taskData.end);
      if (!Number.isFinite(s.getTime()) || !Number.isFinite(e.getTime()) || e <= s) return Number(taskData.hours || 0) || 0;
      let h = (e.getTime() - s.getTime()) / 36e5;
      if (String(taskData.start).slice(0,10) === String(taskData.end).slice(0,10)) {
        const d = String(taskData.start).slice(0,10);
        const lunchS = new Date(`${d}T12:00`);
        const lunchE = new Date(`${d}T13:00`);
        const ov = Math.max(0, Math.min(e.getTime(), lunchE.getTime()) - Math.max(s.getTime(), lunchS.getTime()));
        h -= ov / 36e5;
      }
      h = Math.max(0, Math.min(8, h));
      return Math.round(h * 10) / 10;
    })();
    taskData.hours = recomputeTaskHours;
    if (isOvertimePay(taskData.type)) {
      const ds = String(taskData.start || '').slice(0,10);
      const de = String(taskData.end || '').slice(0,10);
      const ts = String(taskData.start || '').split('T')[1]?.slice(0,5);
      const te = String(taskData.end || '').split('T')[1]?.slice(0,5);
      if (ds !== de || ts !== '17:00' || te !== '19:00') {
        showSubmitError('加班(請款)僅可申請 17:00-19:00，且每日每次固定為 2 小時。');
        setSubmittingTaskId(null);
        return;
      }
      taskData.hours = 2;
    }
    if(!(Number(taskData.hours) > 0)){ showSubmitError('缺少有效時數，請回排班日曆檢查起訖時間設定。'); setSubmittingTaskId(null); return; }
    if (!checkAnnualLeaveEnough(taskData.type, taskData.start, taskData.hours)) { setSubmittingTaskId(null); return; }
    const deputyKey = String(taskData.deputyId || '').toLowerCase();
    const deputyName = skipDeputy ? '-' : (((users || []).find(u => String(u.docId || u.uid || u.email || '').toLowerCase() === deputyKey))?.name || '');
    const payload = {
      ...taskData,
      deputyId: skipDeputy ? '' : (taskData.deputyId||''),
      requesterId: user.docId || user.uid,
      requesterUid: user.uid,
      requesterDocId: user.docId || null,
      requesterEmail: (user.email||'').toLowerCase(),
      requesterName: user.name,
      status: skipDeputy ? 'deputy_signed' : 'pending',
      deputySignedAt: skipDeputy ? now : null,
      deputySignedBy: skipDeputy ? 'EXEMPT' : null,
      timestamp: now,
      submittedAt: now,
      sourceGroupId: taskId || null,
      sourceType: taskId ? 'calendar_event' : ''
    };
    setConfirmData({ type: payload.type, start: payload.start, end: payload.end, hours: payload.hours, deputyName, reason: payload.reason || '' });
    setPendingSubmit(payload);
    setConfirmOpen(true);
  } catch (e) {
    console.error(e);
    showSubmitError(`送出失敗：${e?.message || e || '請稍後再試'}`);
    setSubmittingTaskId(null);
  }
}


const handleManualSubmit = async (e) => {
setSubmitSuccess('');
setSubmitError('');
e.preventDefault();
let finalStart = form.start;
let finalEnd = form.end;
let finalHours = hours;
// 依據輸入模式準備資料
if (inputMode === 'slot') {
if (!slotDate) { alert("請選擇日期"); return; }
const slotRange = getSlotRange(slotDate, slotStartH, slotStartM, slotEndH, slotEndM);
if (!slotRange.valid) { alert("結束時間需晚於開始時間"); return; }
if (!(Number(slotRange.hours) > 0)) { alert("總計時數必須大於 0"); return; }
finalStart = slotRange.start;
finalEnd = slotRange.end;
finalHours = slotRange.hours;
} else {
  // 自訂時間：依「少於一天 / 大於一天」準備資料
  if (manualRangeType === 'lt1' && isOvertime(form.type)) {
    if (!shortDate) { alert("請選擇日期"); return; }
    const ss = `${shortDate}T${String(shortStartH).padStart(2,'0')}:${String(shortStartM).padStart(2,'0')}`;
    const ee = `${shortDate}T${String(shortEndH).padStart(2,'0')}:${String(shortEndM).padStart(2,'0')}`;
    const s = new Date(ss);
    const e = new Date(ee);
    if (isNaN(s.getTime()) || isNaN(e.getTime()) || e <= s) { alert("結束時間需晚於開始時間"); return; }
    if (hours <= 0) { alert("總計時數必須大於 0"); return; }
    finalStart = ss;
    finalEnd = ee;
    finalHours = hours;
  } else {
    if (!multiStartDate) { alert("請選擇起始日期"); return; }
    const picked = (multiDates || []).filter(x => multiSelected && multiSelected[x.date]).map(x => x.date).sort();
    if (!picked.length) { alert("請至少勾選一天"); return; }
    finalStart = `${picked[0]}T${String(multiStartH).padStart(2,'0')}:${String(multiStartM).padStart(2,'0')}`;
    finalEnd = `${picked[picked.length-1]}T${String(multiEndH).padStart(2,'0')}:${String(multiEndM).padStart(2,'0')}`;
    // hours 由上方 useEffect 依工作時段重疊自動計算
    finalHours = Number(hours || 0);
  }
}
if (isOvertimePay(form.type)) {
  const ds = String(finalStart || '').slice(0,10);
  const de = String(finalEnd || '').slice(0,10);
  const ts = String(finalStart || '').split('T')[1]?.slice(0,5);
  const te = String(finalEnd || '').split('T')[1]?.slice(0,5);
  if (ds !== de || ts !== '17:00' || te !== '19:00') {
    showSubmitError('加班(請款)僅可申請 17:00-19:00，且每日每次固定為 2 小時。');
    return;
  }
  finalHours = 2;
}
// 特休額度不足提示（事假除外）
if (!checkAnnualLeaveEnough(form.type, finalStart, finalHours)) { return; }
if (form.type === '補休') {
let totalOvertime = 0;
leaves.forEach(l => { if ((l.requesterId === user.uid || l.requesterId === user.docId || l.requesterUid === user.uid || l.requesterDocId === user.docId) && l.status === 'approved' && isOvertimeComp(l.type)) { totalOvertime += Number(l.hours); } });
let usedCompensatory = 0;
leaves.forEach(l => { if ((l.requesterId === user.uid || l.requesterId === user.docId || l.requesterUid === user.uid || l.requesterDocId === user.docId) && l.status === 'approved' && l.type === '補休') { usedCompensatory += Number(l.hours); } });
const balance = totalOvertime - usedCompensatory;
if (finalHours > balance) { showSubmitError(`補休時數不足，目前可用 ${balance} 小時，申請 ${finalHours} 小時。`); return; }}
if(!isOvertime(form.type) && hasDeputyConflict(form.deputyId, finalStart, finalEnd)){ const hit = getDeputyConflict(form.deputyId, finalStart, finalEnd); const detail = hit ? `\n衝突資料：${hit.title}\n衝突時段：${hit.timeText}${hit.status ? `\n狀態：${hit.status}` : ''}` : ''; showSubmitError(`職務代理人時段衝突，請改選其他人員。${detail}`); return; }
const isOvertimeReq = isOvertime(form.type);
if(!form.type){ showSubmitError('請先選擇假別。'); setTypeError(true); return; }
if(!isOvertimeReq && !form.deputyId){ showSubmitError('請先選擇職務代理人。'); return; }
const deputyName = isOvertimeReq ? '-' : (getUserNameByKey(users, form.deputyId, '') || '');
const payload = { ...form, deputyId: isOvertimeReq ? '' : (form.deputyId||''), requesterId: user.docId || user.uid, requesterUid: user.uid, requesterDocId: user.docId || null, requesterEmail: (user.email||'').toLowerCase(), requesterName: user.name, start: finalStart, end: finalEnd, hours: finalHours, status: isOvertimeReq ? 'deputy_signed' : 'pending', deputySignedAt: isOvertimeReq ? new Date() : null, deputySignedBy: isOvertimeReq ? 'EXEMPT' : null, timestamp: new Date(), sourceGroupId: submittingTaskId || null, sourceType: submittingTaskId ? 'calendar_event' : '', submittedAt: new Date() };
setConfirmData({ type: payload.type, start: payload.start, end: payload.end, hours: payload.hours, deputyName, reason: payload.reason || '' });
setPendingSubmit(payload);
setConfirmOpen(true);
};

const executeConfirmedSubmit = async () => {
  if(!pendingSubmit) { showSubmitError("找不到待送資料，請重新填寫後送出。"); setConfirmOpen(false); return; }
  setSubmitError('');
  const cleanUndefined = (obj) => {
    const out = {};
    Object.keys(obj || {}).forEach(k => {
      const v = obj[k];
      if (v !== undefined) out[k] = v;
    });
    return out;
  };
  const safePayload = cleanUndefined({
    ...pendingSubmit,
    requesterId: pendingSubmit?.requesterId || pendingSubmit?.requesterUid || pendingSubmit?.requesterDocId || user?.docId || user?.uid || '',
    requesterUid: pendingSubmit?.requesterUid || user?.uid || '',
    requesterDocId: pendingSubmit?.requesterDocId || user?.docId || '',
    requesterEmail: String(pendingSubmit?.requesterEmail || user?.email || '').toLowerCase(),
    requesterName: pendingSubmit?.requesterName || user?.name || '',
    deputyId: pendingSubmit?.deputyId || '',
    reason: pendingSubmit?.reason || '',
    sourceGroupId: pendingSubmit?.sourceGroupId || '',
    sourceType: pendingSubmit?.sourceType || '',
  });
  if (!safePayload.requesterId) {
    showSubmitError('送出失敗：找不到申請人識別資料，請重新登入後再試。');
    return;
  }

  const notifyDeputyReview = async (payload) => {
    try {
      if (!payload || payload.status !== 'pending') return;
      if (!payload.deputyId) return;
      if (isOvertime(payload.type)) return;
      const deputyUser = findUserByAnyKey(users, payload.deputyId);
      const deputyEmail = String(deputyUser?.email || '').toLowerCase();
      if (!deputyEmail) return;

      const deputyName = String(deputyUser?.name || '職代人');
      const requesterName = String(payload.requesterName || '申請人');
      const leaveType = String(payload.type || '差勤');
      const sDate = String(payload.start || '').split('T')[0] || '';
      const eDate = String(payload.end || payload.start || '').split('T')[0] || '';
      const dateText = (sDate && eDate) ? (sDate === eDate ? sDate : `${sDate}~${eDate}`) : (sDate || eDate || '-');
      const sTime = String(payload.start || '').split('T')[1]?.slice(0,5) || '';
      const eTime = String(payload.end || '').split('T')[1]?.slice(0,5) || '';
      const timeText = (sTime && eTime) ? `${sTime}~${eTime}` : (sTime || eTime || '整天');
      const hoursText = Number(payload.hours || 0);
      const reasonText = String(payload.reason || payload.note || '').trim() || '-';

      await sendMail({
        targetEmail: deputyEmail,
        subject: `【職代審查】${deputyName}，您有一筆差勤待審：${requesterName} ${leaveType} ${dateText}`,
        body: `${requesterName} ${leaveType} ${dateText}

${deputyName} 您好：

有一筆差勤申請待您審查，資訊如下：
申請人：${requesterName}
假別：${leaveType}
日期：${dateText}
時間：${timeText}
時數：${hoursText} 小時
事由：${reasonText}

請至系統「差單審核」完成審查。
（寄件人：KPPT職再差勤系統）`
      });
    } catch (mailErr) {
      console.warn('mail notify (deputy review) failed:', mailErr);
    }
  };

  setIsSubmitting(true);
  try {
    // 若來自第一區塊(行事曆行程)且已存在同一 sourceGroupId 的申請，改為更新避免分裂成兩單
    const existing = safePayload?.sourceGroupId
      ? leaves.find(l => l.sourceGroupId === safePayload.sourceGroupId && (l.requesterId === safePayload.requesterId) && l.status !== 'withdrawn')
      : null;

    if (existing?.id) {
      await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leaves', existing.id), { ...safePayload, updatedAt: new Date() });
    } else {
      await crud.createLeave(safePayload);
    }

    await notifyDeputyReview(safePayload);

    setConfirmOpen(false);
    setConfirmData(null);
    setPendingSubmit(null);
    setSubmitError('');
    const fromBlock1 = !!safePayload?.sourceGroupId;
    if (!fromBlock1) {
      resetBlock2Form();
      setOpenBlock2(true);
      setTimeout(() => {
        try { block2Ref.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch {}
      }, 0);
      setSubmitSuccess('已成功送出：' + (safePayload.type || '假單') + '。');
    } else {
      setSubmitSuccess('');
    }

    const msg = isOvertime(safePayload.type) ? "加班申請已送出！" : "申請已送出！";
    alert(msg);
  } catch (e) {
    console.error(e);
    const code = String(e?.code || '');
    if (code.includes('permission-denied')) {
      showSubmitError('送出失敗：目前帳號沒有寫入權限，請重新登入或聯絡管理員。');
    } else if (code.includes('unauthenticated')) {
      showSubmitError('送出失敗：登入狀態已失效，請重新登入後再試。');
    } else {
      showSubmitError(`送出失敗：${e?.message || e || '請稍後再試'}`);
    }
  } finally {
    setIsSubmitting(false);
    setSubmittingTaskId(null);
  }
};
const deputies = users.filter(u=>u.name!==user.name);

function ApprovalView({ leaves, currentUser, crud, users, leaveTypes, events, db }) {

// 撤簽 與 修改 Modal 控制狀態

const [adminEditModal, setAdminEditModal] = useState({ open: false, leave: null, hours: '', status: '' });
const exportCSV = () => {

filteredAllLeaves.forEach(l => {
const d1 = l.start.split('T')[0];
const t1 = l.start.split('T')[1] || '';
const d2 = l.end.split('T')[0];
const t2 = l.end.split('T')[1] || '';
const deputyName = l.deputyId ? (getUserNameByKey(users, l.deputyId, '未知')) : '-';
csv += `${l.requesterName},${l.type},${deputyName},${d1},${t1},${d2},${t2},${l.hours},${l.status},${l.recallReason || ''}\n`
});
const link = document.createElement("a");
link.href = encodeURI("data:text/csv;charset=utf-8,"+csv);
link.download = "全團隊請假紀錄.csv";
link.click();
};
const pendingMyDeputy = leaves.filter(l => (l.deputyId === currentUser.uid || l.deputyId === currentUser.docId || String(l.deputyId||'').toLowerCase() === (currentUser.email||'').toLowerCase()) && l.status === 'pending').sort((a,b)=>new Date(b.start||b.timestamp||0)-new Date(a.start||a.timestamp||0));
const pendingLeader = (currentUser.role === 'leader' || currentUser.role === 'admin') ? leaves.filter(l => l.status === 'deputy_signed').sort((a,b)=>new Date(b.start||b.timestamp||0)-new Date(a.start||a.timestamp||0)) : [];
// --- Bulk approval selection (leader) ---
useEffect(() => {

}, [pendingLeader]);

const toggleLeaderSelect = (id) => {
  setSelectedLeaderIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
};
const toggleLeaderSelectAll = () => {
  if (pendingLeader.length === 0) { alert("目前沒有可勾選的待審項目。"); return; }
  setSelectedLeaderIds(prev => (prev.length === pendingLeader.length) ? [] : pendingLeader.map(l => l.id));
};

const handleLeaderBulkApprove = async () => {
  if (selectedLeaderIds.length === 0) { alert("請先勾選要核准的項目"); return; }
  if (processingId) { alert("目前有作業進行中，請稍候再試。"); return; }
  if (!confirm(`確定要一次核准 ${selectedLeaderIds.length} 筆差單嗎？`)) return;

  setProcessingId('bulk_leader');
  try {
    const approvedAt = new Date();
    const approvedByName = currentUser.name || currentUser.displayName || '';
    const leavesToApprove = selectedLeaderIds
      .map(id => pendingLeader.find(l => l.id === id))
      .filter(Boolean);    if (leavesToApprove.length === 0) {
      alert("找不到可核准的資料，請重新勾選後再試。");
      setProcessingId(null);
      return;
    }

    // 使用既有 CRUD 逐筆更新，避免 db 未定義造成批量核准失敗
    await Promise.all(
      leavesToApprove.map(leave =>
        crud.updateLeave(leave.id, {
          status: 'approved',
          approverId: currentUser.uid,
          approvedAt,
          approvedByName,
          approvalDate: new Date()
        })
      )
    );

      try {

          await sendMail({

            subject: "【差勤核准】你的差單已核准",
            body: `你好 ${leave.requesterName||''}：

你的差單已核准。
假別：${leave.type||''}
假別時數：${(leave.hours!=null && leave.hours!=='') ? (leave.hours + ' 小時') : '—'}
起訖：${fmtISO(leave.start)} ～ ${fmtISO(leave.end)}
出差事由：${leave.reason||leave.note||''}

時間序：
1. 送出申請時間：${fmtDT(leave.submittedAt||leave.timestamp)}
2. 職代人員：${leave.deputySignedByName || '—'}｜同意時間：${fmtDT(leave.deputySignedAt)}
3. 組長：${approvedByName||'—'}｜同意時間：${fmtDT(approvedAt)}

（寄件人：KPPT職再差勤系統）`
          });
        }
      } catch (mailErr) { console.warn("mail notify (approved bulk) failed:", mailErr); }
    }

    setSelectedLeaderIds([]);
    alert("批量核准完成！");
  } catch (e) {
    console.warn(e);
    alert("批量核准失敗：" + (e?.message || e || '未知錯誤'));
  } finally {
    setProcessingId(null);
  }
};

const handleDeputyAgree = async (leave) => {

function StatisticsView({ users, leaves, currentUser, onUpdateAnyProfile, crud }) {
const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
const [selectedMonth, setSelectedMonth] = useState('all');
const [selectedUserId, setSelectedUserId] = useState(currentUser.docId);
const [showOtherLeaves, setShowOtherLeaves] = useState(false); // 新增：控制其他假別展開
const [usageTypeFilter,setUsageTypeFilter]=useState('all');
const isAdminOrLeader = currentUser.role === 'admin' || currentUser.role === 'leader';
const viewableUsers = users;
const targetUser = users.find(u => u.docId === selectedUserId) || currentUser;
const getSeniorityStats = () => {
if (!targetUser.joinDate) return { days: 0, text: '未設定到職日', warning: true };
const joinDate = new Date(targetUser.joinDate);
const today = new Date();
let checkDate = new Date(selectedYear, 11, 31);
let years = checkDate.getFullYear() - joinDate.getFullYear();
let months = checkDate.getMonth() - joinDate.getMonth();
// 若到職日的日期晚於基準日(12/31)在該月的日期，則未滿一個月
if (checkDate.getDate() < joinDate.getDate()) { months -= 1; }
if (months < 0) { years--; months += 12; }
let totalMonths = (years * 12) + months;
if (totalMonths < 0) totalMonths = 0;
let days = 0;
if (totalMonths >= 6 && totalMonths < 12) days = 3;
else if (totalMonths >= 12 && totalMonths < 24) days = 7;
else if (totalMonths >= 24 && totalMonths < 36) days = 10;
else if (totalMonths >= 36 && totalMonths < 60) days = 14;
else if (totalMonths >= 60 && totalMonths < 120) days = 15;
else if (totalMonths >= 120) days = Math.min(30, 15 + (Math.floor(totalMonths/12) - 9));
let y2 = today.getFullYear() - joinDate.getFullYear();
let m2 = today.getMonth() - joinDate.getMonth();
if (m2 < 0 || (m2 === 0 && today.getDate() < joinDate.getDate())) { y2--; m2 += 12; }
if (today.getDate() < joinDate.getDate()) { m2--; }
return { days, text: `年資 ${years >= 0 ? years : 0} 年 ${months >= 0 ? months : 0} 個月 (依當年12/31計算)` };
};
const seniority = getSeniorityStats();
const extraLeaveDays = Number(targetUser.extraLeaveDays || 0);
const filteredLeaves = leaves.filter(l =>
(l.requesterId === targetUser.uid || l.requesterId === targetUser.docId) &&
l.status === 'approved' &&
l.start.startsWith(String(selectedYear)) &&
(selectedMonth === 'all' ? true : l.start.startsWith(`${selectedYear}-${selectedMonth}`))
).sort((a,b) => new Date(b.start) - new Date(a.start));
const usageFilteredLeaves = usageTypeFilter==='all'?filteredLeaves:filteredLeaves.filter(l=>l.type===usageTypeFilter);

let usedAnnual = 0;
let usedSick = 0;
let usedPersonal = 0;
let usedOvertimePay = 0; // 加班(請款)
let totalCompensatoryEarned = 0;
let totalCompensatoryUsed = 0;
// 新增：其他假別統計計算
let usedMarriage = 0;
let usedBereavement = 0;
let usedMaternity = 0;
let usedFamilyCare = 0;
let usedOfficial = 0; // 新增：公務出差
filteredLeaves.forEach(l => {
const hours = getEffectiveLeaveHours(l);
const days = hours / 8;
if (l.type.includes('特休')) usedAnnual += hours;
if (l.type.includes('病假') || l.type.includes('生理假')) usedSick += hours;
if (l.type.includes('事假') && !l.type.includes('公假')) usedPersonal += hours;
if (isOvertimeComp(l.type)) totalCompensatoryEarned += hours;
if (isOvertimePay(l.type)) usedOvertimePay += hours;
if (l.type === '補休') totalCompensatoryUsed += hours;
// 其他假別
if (l.type.includes('婚假')) usedMarriage += hours;
if (l.type.includes('喪假')) usedBereavement += hours;
if (l.type.includes('產假') || l.type.includes('陪產假')) usedMaternity += hours;
if (l.type === '家庭照顧假') {
usedFamilyCare += hours;
// 家庭照顧假依法併入事假額度計算
usedPersonal += hours;}
// 公務出差
if (l.type === '出差' || l.type === '公出' || l.type === '公假') usedOfficial += hours;
});
let allTimeCompensatoryEarned = 0;
let allTimeCompensatoryUsed = 0;
let allTimeOvertimePay = 0;
let totalHonorEarned = 0;
let totalHonorUsed = 0;
leaves.forEach(l => {
if ((l.requesterId === targetUser.uid || l.requesterId === targetUser.docId) && l.status === 'approved') {
if (isOvertimeComp(l.type)) allTimeCompensatoryEarned += Number(l.hours);
if (isOvertimePay(l.type)) allTimeOvertimePay += Number(l.hours);
if (l.type === '補休') allTimeCompensatoryUsed += Number(l.hours);
// 榮譽假加總
if (l.type === '榮譽假(獲得)') totalHonorEarned += Number(l.hours);
if (l.type === '榮譽假') totalHonorUsed += Number(l.hours);}
});
const compensatoryBalance = allTimeCompensatoryEarned - allTimeCompensatoryUsed;
const honorBalance = totalHonorEarned - totalHonorUsed;
const totalAnnualEntitled = (seniority.days + extraLeaveDays) * 8;
const overtimePayQuota = Number(((targetUser?.overtimePayQuotaByYear || {})[String(selectedYear)] ?? targetUser?.overtimePayQuota ?? 0));
const overtimePayUsedYear = leaves.filter(l =>
(l.requesterId === targetUser.uid || l.requesterId === targetUser.docId) &&
l.status === 'approved' &&
String(l.start||'').startsWith(String(selectedYear)) &&
isOvertimePay(l.type)
).reduce((s,l)=>s + getEffectiveLeaveHours(l), 0);
const overtimePayAvailable = Math.max(0, overtimePayQuota - overtimePayUsedYear);
const handleEditExtraLeave = () => {
if (!isAdminOrLeader) { alert("權限不足，無法執行此操作。"); return; }
const newDays = prompt(`請輸入 ${targetUser.name} 的「單位額外特休」天數 (目前為 ${extraLeaveDays} 天)：\n*若要取消/刪除配額，請直接輸入 0。`, extraLeaveDays);
if (newDays !== null && !isNaN(newDays) && newDays.trim() !== '') {
onUpdateAnyProfile(targetUser.docId, { extraLeaveDays: Number(newDays) });}
};
const handleSetOvertimePayQuotaAll = async () => {
if (!isAdminOrLeader) { alert("權限不足，無法執行此操作。"); return; }
const defaultQuota = 24;
const input = prompt(`請輸入 ${selectedYear} 年度「加班(請款)」全員統一額度（小時）：`, String(defaultQuota));
if (input === null) return;
const quota = Number(input);
if (!isFinite(quota) || quota < 0) { alert('請輸入 0 以上的有效數字。'); return; }
const targets = (viewableUsers || []).filter(u => u && u.docId);
if (!targets.length) { alert('找不到可設定的成員資料。'); return; }
if (!confirm(`確定將 ${selectedYear} 年度加班(請款)額度統一設為 ${quota} 小時？\n共 ${targets.length} 位成員。`)) return;
try {
await Promise.all(targets.map(u => {
const byYear = { ...(u.overtimePayQuotaByYear || {}) };
byYear[String(selectedYear)] = quota;
return Promise.resolve(onUpdateAnyProfile(u.docId, { overtimePayQuotaByYear: byYear }));
}));
alert(`已完成：${selectedYear} 年度全員加班(請款)額度 ${quota} 小時。`);
} catch (e) {
alert('批次設定失敗: ' + (e?.message || String(e)));
}
};
// 新增：發放榮譽假功能
const handleAddHonorLeave = async () => {
if (!isAdminOrLeader) { alert("權限不足，無法執行此操作。"); return; }
const hoursStr = prompt(`請輸入要發放給 ${targetUser.name} 的「榮譽假」時數\n(例如：1天請輸入 8)：`);
if (!hoursStr || isNaN(hoursStr) || Number(hoursStr) <= 0) { alert("請輸入大於 0 的有效時數。"); return; }
const reason = prompt(`請輸入獲得榮譽假的事由：`);
if (!reason) { alert("請輸入事由後再送出。"); return; }
const todayStr = getLocalDateString(new Date());
try {
await crud.createLeave({
type: '榮譽假(獲得)',
requesterId: targetUser.uid || targetUser.docId,
requesterUid: targetUser.uid || null,
requesterDocId: targetUser.docId || null,
requesterEmail: (targetUser.email||'').toLowerCase(),
requesterName: targetUser.name,
hours: Number(hoursStr),
reason: reason,
status: 'approved', // 直接核准不需審核
start: `${todayStr}T08:00`,
end: `${todayStr}T17:00`,
timestamp: new Date()
});
alert('榮譽假發放成功！已自動計入時數餘額與明細中。');
} catch (e) {
alert('發放失敗: ' + e.message);}
};
// 新增：刪除與編輯榮譽假功能
const handleDeleteHonor = async (id) => {
if (!isAdminOrLeader) { alert("權限不足，無法執行此操作。"); return; }
if(confirm("確定要刪除這筆「榮譽假(獲得)」紀錄嗎？")) {
try {
await crud.deleteLeave(id);
alert("刪除成功");
} catch(e) { alert("刪除失敗: " + e.message); }}
};
const handleEditHonor = async (l) => {
if (!isAdminOrLeader) { alert("權限不足，無法執行此操作。"); return; }
const newHours = prompt(`修改「榮譽假(獲得)」時數：`, l.hours);
if (newHours !== null && !isNaN(newHours) && newHours.trim() !== '') {
try {
await crud.updateLeave(l.id, { hours: Number(newHours) });
alert("修改成功");
} catch(e) { alert("修改失敗: " + e.message); }}
};
return (
<div className="max-w-5xl mx-auto space-y-6">

<div className="border p-3 rounded-lg text-center bg-gray-50">
<div className="text-xs text-gray-500 mb-1">婚假</div>
<div className="font-bold text-lg text-gray-800">{usedMarriage} <span className="text-xs font-normal">小時</span><div className="text-[10px] text-gray-400">({(usedMarriage/8).toFixed(2)}天)</div></div></div>
<div className="border p-3 rounded-lg text-center bg-gray-50">
<div className="text-xs text-gray-500 mb-1">喪假</div>
<div className="font-bold text-lg text-gray-800">{usedBereavement} <span className="text-xs font-normal">小時</span><div className="text-[10px] text-gray-400">({(usedBereavement/8).toFixed(2)}天)</div></div></div>
<div className="border p-3 rounded-lg text-center bg-gray-50">
<div className="text-xs text-gray-500 mb-1">產假/陪產假</div>
<div className="font-bold text-lg text-gray-800">{usedMaternity} <span className="text-xs font-normal">小時</span><div className="text-[10px] text-gray-400">({(usedMaternity/8).toFixed(2)}天)</div></div></div>
<div className="border p-3 rounded-lg text-center bg-gray-50">
<div className="text-xs text-gray-500 mb-1">家庭照顧假</div>
<div className="font-bold text-lg text-gray-800">{usedFamilyCare} <span className="text-xs font-normal">小時</span><div className="text-[10px] text-gray-400">({(usedFamilyCare/8).toFixed(2)}天)</div></div></div></div>
)}</div>
<div className="bg-white rounded-lg shadow-sm overflow-hidden border border-gray-200">
<div className="p-4 border-b bg-gray-50 flex flex-col md:flex-row md:items-center md:justify-between gap-2">
<h3 className="font-bold text-gray-700 flex items-center gap-2"><List size={18}/> 請假使用紀錄 ({selectedMonth === 'all' ? '全年' : `${selectedMonth} 月`})</h3>
<div className="flex items-center gap-2"><span className="text-xs font-bold text-gray-500">假別篩選</span><select className="border p-2 rounded text-sm bg-white outline-none" value={usageTypeFilter} onChange={e=>setUsageTypeFilter(e.target.value)}><option value="all">全部</option>{Array.from(new Set(filteredLeaves.map(l=>l.type))).map(t=><option key={t} value={t}>{t}</option>)}</select></div></div>
<table className="w-full text-left">
<thead className="bg-slate-50 border-b border-slate-200 text-slate-600">
<tr>
<th className="p-4 text-sm font-semibold tracking-wide w-40 whitespace-nowrap">日期</th>
<th className="p-4 text-sm font-semibold tracking-wide w-36 whitespace-nowrap">時間</th>
<th className="p-4 text-sm font-semibold tracking-wide w-32">假別</th>
<th className="p-4 text-sm font-semibold tracking-wide w-24">時數/天</th>
<th className="p-4 text-sm font-semibold tracking-wide">事由</th>
{isAdminOrLeader && <th className="p-4 text-sm font-semibold tracking-wide w-20 text-center">操作</th>}</tr></thead>
<tbody>
{usageFilteredLeaves.map(l => {
// 分解日期與時間
const d1 = l.start.split('T')[0];
const t1 = l.start.split('T')[1] || '';
const d2 = l.end.split('T')[0];
const t2 = l.end.split('T')[1] || '';
const compactDateStr = (() => {
  if (d1 === d2) return d1;
  const y1 = d1.slice(0, 4), m1 = d1.slice(5, 7), dd1 = d1.slice(8, 10);
  const y2 = d2.slice(0, 4), m2 = d2.slice(5, 7), dd2 = d2.slice(8, 10);
  if (y1 === y2) {
    if (m1 === m2) return `${m1}/${dd1}~${dd2}`;
    return `${m1}/${dd1}~${m2}/${dd2}`;
  }
  return `${y1}/${m1}/${dd1}~${y2}/${m2}/${dd2}`;
})();
const dateStr = compactDateStr;
const fullDateStr = d1 === d2 ? d1 : `${d1}~${d2}`;
const timeStr = `${t1} ~ ${t2}`;
const effectiveHours = getEffectiveLeaveHours(l);
// 判斷是否為公務或正向發放
const isOfficialOrGain = ['出差', '公出', '公假', '榮譽假(獲得)'].includes(l.type);
return (
<tr key={l.id} className="border-b border-gray-100 last:border-0 hover:bg-slate-50 transition-colors">
<td className="p-4 text-sm text-gray-800 font-medium whitespace-nowrap" title={fullDateStr}>{dateStr}</td>
<td className="p-4 text-sm text-gray-500 whitespace-nowrap">{timeStr}</td>
<td className="p-4">
<span className={`inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold ${isOfficialOrGain ? 'bg-sky-100 text-sky-700' : 'bg-orange-100 text-orange-700'}`}>
{l.type}</span></td>
<td className="p-4">
<span className={`px-2 py-1 rounded-md font-bold text-sm ${isOfficialOrGain ? 'text-sky-700' : 'text-gray-700'}`}>
{effectiveHours} 時 <span className="text-xs text-gray-400">({(effectiveHours/8).toFixed(2)} 天)</span></span></td>
<td className="p-4 text-sm text-gray-600 max-w-[250px] truncate" title={l.reason}>{l.reason}</td>
{isAdminOrLeader && (
<td className="p-4 text-center whitespace-nowrap min-w-[180px]">
{l.type === '榮譽假(獲得)' && (
<div className="flex justify-center gap-1">
<button onClick={() => handleEditHonor(l)} className="text-blue-600 hover:bg-blue-100 p-1.5 rounded-md transition" title="修改時數"><Edit2 size={14}/></button>
<button onClick={() => handleDeleteHonor(l.id)} className="text-red-600 hover:bg-red-100 p-1.5 rounded-md transition" title="刪除紀錄"><Trash2 size={14}/></button></div>
)}</td>
)}</tr>)
})}
{filteredLeaves.length === 0 && <tr><td colSpan={isAdminOrLeader ? 6 : 5} className="p-8 text-center text-gray-400">尚無使用紀錄</td></tr>}</tbody></table></div></div>);}

// === 會計統計 ===
function AccountingStatsView({ users, leaves, leaveTypes, currentUser }) {
  const now = new Date();
  const [selectedYear, setSelectedYear] = useState(now.getFullYear());
  const [selectedUserId, setSelectedUserId] = useState('ALL'); // ALL = 全體
  const [showOther, setShowOther] = useState(false);

  const viewableUsers = users || [];
  const targetUser = selectedUserId === 'ALL' ? null : (viewableUsers.find(u => u.docId === selectedUserId) || currentUser);

  const yearOptions = [...Array(11)].map((_, i) => now.getFullYear() - 5 + i);
  const months = [...Array(12)].map((_, i) => String(i + 1).padStart(2, '0'));

  // 依年資計算法定特休天數（以年底為計算基準）
  const getSeniorityDays = (joinDateStr) => {
    if (!joinDateStr) return { days: 0, text: '未設定到職日' };
    const joinDate = new Date(joinDateStr);
    const checkDate = new Date(selectedYear, 11, 31);
    let years = checkDate.getFullYear() - joinDate.getFullYear();
    let monthsDiff = checkDate.getMonth() - joinDate.getMonth();
    if (monthsDiff < 0 || (monthsDiff === 0 && checkDate.getDate() < joinDate.getDate())) { years--; monthsDiff += 12; }
    if (checkDate.getDate() < joinDate.getDate()) { monthsDiff--; }
    let totalMonths = (years * 12) + monthsDiff;
    if (totalMonths < 0) totalMonths = 0;
    let days = 0;
    if (totalMonths >= 6 && totalMonths < 12) days = 3;
    else if (totalMonths >= 12 && totalMonths < 24) days = 7;
    else if (totalMonths >= 24 && totalMonths < 36) days = 10;
    else if (totalMonths >= 36 && totalMonths < 60) days = 14;
    else if (totalMonths >= 60 && totalMonths < 120) days = 15;
    else if (totalMonths >= 120) days = Math.min(30, 15 + (Math.floor(totalMonths/12) - 9));
    const nowDate = new Date();
    let y2 = nowDate.getFullYear() - joinDate.getFullYear();
    let m2 = nowDate.getMonth() - joinDate.getMonth();
    if (m2 < 0 || (m2 === 0 && nowDate.getDate() < joinDate.getDate())) { y2--; m2 += 12; }
    if (nowDate.getDate() < joinDate.getDate()) { m2--; }
    let totalMonths2 = (y2 * 12) + m2;
    if (totalMonths2 < 0) totalMonths2 = 0;
    const displayYears = Math.max(0, y2);
    const displayMonths = Math.max(0, m2);
    const entitlementYears = Math.max(0, years);
    const entitlementMonths = Math.max(0, monthsDiff);
    return { days, text: `${displayYears} 年 ${displayMonths} 個月`, entitlementText: `${entitlementYears} 年 ${entitlementMonths} 個月` };
  };

  // 會計用假別分組（例假日不納入統計）
  // 依附圖的會計輸出格式：休假(特休)、榮譽假、加班(請款)、加班(補休用)、補休、其他假別
  const BASE_ROWS = [
    // 依附圖的會計輸出格式：特休、榮譽假、加班(請款)、加班(補休)、補休、其他假別
    // 注意：此處僅改「名稱顯示」與「統計歸類」(依假別 type)，不會影響其他頁面資料
    { key: '特休', label: '特休', match: (t) => {
        const s = String(t||'');
        return s.includes('特休') && !s.includes('獲得');
      }
    },
    { key: '榮譽假', label: '榮譽假', match: (t) => String(t||'') === '榮譽假' },
    { key: '加班(請款)', label: '加班(請款)', match: (t) => String(t||'') === '加班(請款)' },
    { key: '加班(補休)', label: '加班(補休)', match: (t) => String(t||'') === '加班(補休)' },
    { key: '補休', label: '補休', match: (t) => String(t||'') === '補休' },
  ];

  const personalLeaveNames = (leaveTypes || []).filter(t => t.category === 'personal').map(t => t.name);
  const otherPersonalNames = personalLeaveNames.filter(n => {
    if (!n) return false;
    const s = String(n);
    if (s.includes('特休') || s === '榮譽假') return false;
    if (s.includes('補休')) return false;
    if (s.includes('病假')) return false;
    if (s.includes('例假')) return false;
    return true;
  });

  const scopedLeaves = (leaves || []).filter(l => {
    if (l.status !== 'approved') return false;
    if (!String(l.start || '').startsWith(String(selectedYear))) return false;
    if (selectedUserId === 'ALL') return true;
    const rid = l.requesterId;
    return !!targetUser && (rid === targetUser.uid || rid === targetUser.docId);
  
  });

  // Helper: split leave hours across months by calendar days (handles cross-month leaves)
  const splitLeaveMonths = (l, year) => {
    const hours = Number(l.hours || 0);
    if (!hours) return {};
    const startStr = String(l.start || '').slice(0, 10);
    const endStr = String(l.end || l.start || '').slice(0, 10);
    if (!startStr) return {};
    if (!endStr || startStr === endStr) {
      const m = startStr.slice(5, 7);
      return { [m]: hours };
    }
    const startD = new Date(startStr + 'T00:00');
    const endD = new Date(endStr + 'T00:00');
    if (endD <= startD) return { [startStr.slice(5, 7)]: hours };
    // Count calendar days per month within the target year
    const daysByMonth = {};
    let totalDays = 0;
    const cur = new Date(startD);
    while (cur <= endD) {
      totalDays++;
      if (cur.getFullYear() === year) {
        const m = String(cur.getMonth() + 1).padStart(2, '0');
        daysByMonth[m] = (daysByMonth[m] || 0) + 1;
      }
      cur.setDate(cur.getDate() + 1);
    }
    if (!totalDays) return {};
    const result = {};
    Object.entries(daysByMonth).forEach(([m, d]) => { result[m] = hours * (d / totalDays); });
    return result;
  };

  const sumHoursBy = (matchFn) => {
    const out = {};
    months.forEach(m => out[m] = 0);
    scopedLeaves.forEach(l => {
      if (!matchFn(l.type, l)) return;
      const splits = splitLeaveMonths(l, selectedYear);
      Object.entries(splits).forEach(([m, h]) => { if (m in out) out[m] += h; });
    });
    return out;
  };
  const toInt = (n) => {
    const v = Number(n || 0);
    if (!isFinite(v)) return 0;
    // 會計輸出以整數小時計（若未來要保留小數可改這行）
    return Math.round(v);
  };

  // #額外加班：可補休（依加班(補休)核准小時數累加）
  const extraCompHours = (() => {
    if (!targetUser) return 0;
    let total = 0;
    scopedLeaves.forEach(l => {
      const t = String(l.type || '');
      // 只計入「加班(補休...)」這種會產生補休的加班，避免把「補休」本身算進來
      if (t === '加班(補休)') {
        total += Number(l.hours || 0);
      }
    });
    return toInt(total);
  })();

  const calcExtraCompHoursFromLeaves = (arr) => {
    let total = 0;
    (arr || []).forEach(l => {
      const t = String(l.type || '');
      if (t === '加班(補休)') {
        total += Number(l.hours || 0);
      }
    });
    return toInt(total);
  };

  const buildExportDatasetForUser = (u) => {
    const userLeaves = (leaves || []).filter(l => {
      if (l.status !== 'approved') return false;
      if (!String(l.start || '').startsWith(String(selectedYear))) return false;
      const rid = l.requesterId;
      return (rid === u.uid || rid === u.docId);
    });

    const months = [...Array(12)].map((_, i) => String(i + 1).padStart(2, '0'));
    const sumByMatch = (matchFn) => {
      const out = {};
      months.forEach(mm => out[mm] = 0);
      userLeaves.forEach(l => {
        if (!matchFn(l.type, l)) return;
        const splits = splitLeaveMonths(l, selectedYear);
        Object.entries(splits).forEach(([mm, h]) => { if (mm in out) out[mm] += h; });
      });
      // 轉整數
      months.forEach(mm => out[mm] = toInt(out[mm]));
      return out;
    };

    const rows = BASE_ROWS.map(r => {
      const byMonth = sumByMatch(r.match);
      const total = months.reduce((a, mm) => a + (byMonth[mm] || 0), 0);
      return { key: r.key, label: r.label, byMonth, total };
    });

    // 其他假別：把所有 personal 類別且未被上述列吃到的假別合併
    const baseMatchers = BASE_ROWS.map(r => r.match);
    const otherByMonth = {};
    months.forEach(mm => otherByMonth[mm] = 0);
    userLeaves.forEach(l => {
      const type = String(l.type || '');
      const isPersonal = (leaveTypes || []).some(t => t.category === 'personal' && t.name === type);
      if (!isPersonal) return;
      // 排除已被 BASE_ROWS 分類者
      const hit = baseMatchers.some(fn => fn(type, l));
      if (hit) return;
      const splits = splitLeaveMonths(l, selectedYear);
      Object.entries(splits).forEach(([mm, h]) => { if (mm in otherByMonth) otherByMonth[mm] += h; });
    });
    months.forEach(mm => otherByMonth[mm] = toInt(otherByMonth[mm]));
    const otherTotal = months.reduce((a, mm) => a + (otherByMonth[mm] || 0), 0);
    rows.push({ key: '其他假別', label: '其他假別', byMonth: otherByMonth, total: otherTotal });

    return { months, rows };
  };

  const downloadExcelLike = () => {
    try {
      const yearLabel = `${selectedYear}年`;
      const monthsLabel = [...Array(12)].map((_, i) => `${i+1}月`);

      const usersToExport = (selectedUserId === 'ALL')
        ? (viewableUsers || []).filter(u => u && (u.uid || u.docId))
        : [targetUser].filter(Boolean);

      // 內容：HTML Table（Excel 可直接開啟）
      const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      let html = '';
      html += '<html><head><meta charset="utf-8"></head><body>';
      html += '<table border="1" cellspacing="0" cellpadding="4" style="border-collapse:collapse;font-family:Microsoft JhengHei,Arial;font-size:12px;">';

      // Header row (像附圖：B1 顯示年度)
      html += '<tr>';
      html += '<th style="min-width:120px;"></th>';
      html += `<th style="min-width:160px;text-align:left;">${esc(yearLabel)}</th>`;
      monthsLabel.forEach(m => html += `<th style="min-width:60px;">${esc(m)}</th>`);
      html += '<th style="min-width:70px;">總計</th>';
      html += '<th style="min-width:120px;">備註</th>';
      html += '</tr>';

      usersToExport.forEach((u, uIdx) => {
        const { months, rows } = buildExportDatasetForUser(u);

        // 左側使用者資訊（附圖那種多行）
        const join = u.joinDate || u.join_date || '';
        const seniority = getSeniorityDays(join);
        const extraLeaveDays = Number(u.extraLeaveDays || 0);
        const honorEarned = Number(u.honorEarned || 0);
        const honorUsed = Number(u.honorUsed || 0);

        const userLeavesForExport = (leaves || []).filter(l => {
          if (l.status !== 'approved') return false;
          if (!String(l.start || '').startsWith(String(selectedYear))) return false;
          const rid = l.requesterId;
          return (rid === u.uid || rid === u.docId);
        });
        const extraCompEarned = calcExtraCompHoursFromLeaves(userLeavesForExport);
        const honorBalance = Math.max(0, honorEarned - honorUsed);
        const baseAnnualHoursExport = toInt(((seniority.days||0)*8) + (extraLeaveDays*8) + honorBalance);

        // 名字 + 到職日（同一欄，不用合併儲存格）
        const nameHireLine = esc(u.name || u.displayName || u.email || '—') + (join ? ` (${esc(join)}到職)` : '');

        rows.forEach((r, idx) => {
          const isOvertimeGroup = (r.key === '加班(補休)' || r.key === '補休');
          const bg = isOvertimeGroup ? 'background:#FFF2CC;' : '';
          html += `<tr style="${bg}">`;

          // 第一列顯示姓名+到職日，其餘列留空（不用 rowspan 避免合併欄位）
          if (idx === 0) {
            html += `<td style="white-space:nowrap;vertical-align:middle;">${nameHireLine}</td>`;
          } else {
            html += `<td></td>`;
          }
          html += `<td style="text-align:left;white-space:nowrap;">${esc(r.label)}</td>`;
          months.forEach(mm => {
            const v = r.byMonth?.[mm] || 0;
            html += `<td style="text-align:right;">${esc(v)}</td>`;
          });
          html += `<td style="text-align:right;font-weight:bold;">${esc(r.total || 0)}</td>`;
          html += `<td></td>`;
          html += '</tr>';
        });

        // 空白分隔列（像 Excel 會留一點空間）
        html += '<tr><td colspan="16" style="border:none;height:8px;"></td></tr>';
      });

      html += '</table></body></html>';

      const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${yearLabel}_會計統計.xls`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch (e) {
      alert('匯出失敗：' + (e?.message || String(e)));
      console.warn(e);
    }
  };


  const rowData = BASE_ROWS.map(r => ({ ...r, months: sumHoursBy((t) => r.match(t)) }));
  const otherAgg = sumHoursBy((t) => otherPersonalNames.includes(String(t||'')));
  const otherDetail = [...otherPersonalNames].sort((a, b) => { if (a === '事假' && b !== '事假') return -1; if (b === '事假' && a !== '事假') return 1; return String(a).localeCompare(String(b), 'zh-Hant'); }).map(name => ({ key: '其他:' + name, label: name, months: sumHoursBy((t) => String(t||'') === name) }));

  // 基本配額說明（只在個人模式顯示）
  const seniority = targetUser ? getSeniorityDays(targetUser.joinDate) : null;
  const extraLeaveDays = targetUser ? Number(targetUser.extraLeaveDays || 0) : 0;
  const honorEarned = targetUser ? scopedLeaves.filter(l => l.type === '榮譽假(獲得)').reduce((s,l)=>s+Number(l.hours||0),0) : 0;
  const honorUsed = targetUser ? scopedLeaves.filter(l => l.type === '榮譽假').reduce((s,l)=>s+Number(l.hours||0),0) : 0;

  const honorBalance = Math.max(0, honorEarned - honorUsed);
  const baseAnnualHours = ((seniority?.days||0) + (extraLeaveDays||0)) * 8 + honorBalance;
  const baseAnnualDays = ((seniority?.days||0) + (extraLeaveDays||0)) + Math.round(honorBalance/8);
  const extraCompTotal = Math.max(0, Number(extraCompHours||0));
  const extraCompDays = Math.round(extraCompTotal/8);
  const grandTotalHours = baseAnnualHours + extraCompTotal;
  const grandTotalDays = baseAnnualDays + extraCompDays;
  const toDayHourText = (hours) => {
    const h = Math.max(0, Math.round(Number(hours || 0)));
    const d = Math.floor(h / 8);
    const r = h % 8;
    if (d > 0 && r > 0) return `${d}天${r}小時`;
    if (d > 0) return `${d}天`;
    return `${r}小時`;
  };

  const fmt = (v) => {
    const n = Number(v || 0);
    if (!n) return '';
    return (n % 1 === 0) ? String(n) : n.toFixed(1);
  };

  return (
    <div className="max-w-7xl mx-auto">
      <div className="bg-white p-4 rounded shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <h2 className="text-xl font-bold flex items-center gap-2"><Calculator/> 會計統計</h2>
        <div className="flex gap-2 flex-wrap items-center">
          <select className="border p-2 rounded text-sm bg-gray-50 outline-none focus:bg-white" value={selectedUserId} onChange={e=>{ setSelectedUserId(e.target.value); setShowOther(false); }}>
            <option value="ALL">全體</option>
            {viewableUsers.map(u => <option key={u.docId} value={u.docId}>{u.name}</option>)}
          </select>
          <select className="border p-2 rounded text-sm bg-gray-50 outline-none focus:bg-white" value={selectedYear} onChange={e=>setSelectedYear(Number(e.target.value))}>
            {yearOptions.map(y => <option key={y} value={y}>{y} 年度</option>)}
          </select>
          <button onClick={downloadExcelLike} className="inline-flex items-center gap-1.5 px-3 py-2 rounded bg-emerald-600 hover:bg-emerald-700 text-white text-sm shadow-sm">
            <Download size={16}/> 匯出Excel
          </button>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-4">
        <div className="lg:col-span-1">
          <div className="bg-white rounded-xl shadow-sm border p-5">
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-bold text-gray-800">基本假別說明</h3>

k text-xs font-bold text-gray-500 mb-1">顯示單字</label><input className="w-full border p-2 rounded" value={form.initials} onChange={e=>setForm({ ...form, initials:e.target.value})} maxLength={1}/></div><div><label className="block text-xs font-bold text-gray-500 mb-1">頭像顏色</label><input type="color" className="h-9 w-full rounded border cursor-pointer" value={form.borderColor || '#e5e7eb'} onChange={e=>setForm({ ...form, borderColor:e.target.value})} /></div></div><div className="pt-2 flex gap-3"><button onClick={onClose} className="flex-1 py-2 text-gray-500 hover:bg-gray-100 rounded">取消</button><button onClick={()=>onSave(form)} className="flex-1 py-2 bg-blue-600 text-white font-bold rounded hover:bg-blue-700">儲存</button></div></div></div></div>);}

  const list = Array.isArray(colors) ? colors : [];

  const idx = list.findIndex(x => x.c === current);

delete next[editWorkId];
setWorkC(next);
}
setEditWorkId(null);
} else {
