setWorkC(prev => prev && prev[newWork] ? prev : { ...prev, [newWork]: 'bg-blue-100 text-blue-800' });
}
setNewWork('');

setNewArea(area);
window.scrollTo({ top: 0, behavior: 'smooth' });
};
const handleAddLeave = () => { if(!newLeave.name) return alert("請輸入假別名稱"); if(editLeaveId) { handleManageLeaveTypes('update', { ...newLeave, id: editLeaveId }); setEditLeaveId(null); } else { handleManageLeaveTypes('add', newLeave); } setNewLeave({ name: '', category: 'personal', desc: '' }); }

00 ${editLeaveId === t.id ? 'ring-2 ring-yellow-400' : ''}`}><div><span className="font-bold text-gray-800 inline-block w-24">{t.name}</span><span className="text-gray-500 text-xs">{t.desc}</span></div><div className="flex gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity"><button onClick={()=>startEditLeave(t)} className="text-gray-400 hover:text-blue-600 p-1.5 bg-gray-50 rounded"><Edit size={14}/></button><button onClick={()=>handleManageLeaveTypes('delete', t.id)} className="text-gray-400 hover:text-red-600 p-1.5 bg-red-50 rounded"><Trash2 size={14}/></button></div></div>))}</div></div><div><h3 className="text-sm font-bold text-orange-700 mb-2 border-b pb-1 mt-4">區段二：私假 (依法令給假)</h3><div className="flex flex-col gap-2">{leaveTypes.filter(t=>t.category==='personal').map(t => (<div key={t.id} className={`flex justify-between items-center bg-white border px-3 py-2 rounded-lg text-sm group hover:border-orange-300 ${editLeaveId === t.id ? 'ring-2 ring-yellow-400' : ''}`}><div><span className="font-bold text-gray-800 inline-block w-24">{t.name}</span><span className="text-gray-500 text-xs">{t.desc}</span></div><div className="flex gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity"><button onClick={()=>startEditLeave(t)} className="text-gray-400 hover:text-blue-600 p-1.5 bg-gray-50 rounded"><Edit size={14}/></button><button onClick={()=>handleManageLeaveTypes('delete', t.id)} className="text-gray-400 hover:text-red-600 p-1.5 bg-red-50 rounded"><Trash2 size={14}/></button></div></div>))}</div></div></div></div>

function DatabaseAdminView({ events, leaves, users, crud, db }) {
const [activeTab, setActiveTab] = useState('events');
const [selectedEvents, setSelectedEvents] = useState([]);
const [selectedLeaves, setSelectedLeaves] = useState([]);
const [isProcessing, setIsProcessing] = useState(false);
const [targetYear, setTargetYear] = useState(new Date().getFullYear());
const [leaveFilterMonth, setLeaveFilterMonth] = useState('all');
const [leaveFilterUser, setLeaveFilterUser] = useState('all');
const [leaveFilterType, setLeaveFilterType] = useState('all');
const [leaveFilterStatus, setLeaveFilterStatus] = useState('all');
const [editOpen, setEditOpen] = useState(false);
const [editTarget, setEditTarget] = useState(null);
const [editForm, setEditForm] = useState({ type:'', start:'', end:'', hours:0, reason:'', status:'pending', deputyId:'' });
const eventGroups = useMemo(() => {
const groups = {};
events.forEach(e => {
if (!groups[e.groupId]) groups[e.groupId] = { id: e.groupId, date: e.date, type: '', items: [] };
if (e.type === 'tag') { groups[e.groupId].type = e.item; groups[e.groupId].date = e.date; } else if (e.type === 'person') { groups[e.groupId].items.push(e.userName); }
});
return Object.values(groups).sort((a, b) => new Date(b.date) - new Date(a.date));
}, [events]);
const sortedLeaves = [...leaves].sort((a,b) => new Date(b.timestamp || b.start) - new Date(a.timestamp || a.start));
const leaveTypeOptions = useMemo(()=>{
  const set = new Set(sortedLeaves.map(l=>normalizeOvertimeType(l.type||'')).filter(Boolean));
  return Array.from(set).sort();
}, [sortedLeaves]);
const filteredLeaves = useMemo(()=>{
  return sortedLeaves.filter(l=>{
    const d = (l.start||l.timestamp||'').split('T')[0];
    if(!d) return false;
    const parts = d.split('-');
    const y = Number(parts[0]);
    const m = parts[1];
    if(targetYear && y !== Number(targetYear)) return false;
    if(leaveFilterMonth !== 'all' && m !== String(leaveFilterMonth).padStart(2,'0')) return false;
    if(leaveFilterUser !== 'all') {
      const rid = l.requesterId || l.requesterUid || l.requesterDocId || '';
      const did = l.requesterDocId || '';
      if(!(rid === leaveFilterUser || did === leaveFilterUser)) return false;
    }
    const t = normalizeOvertimeType(l.type||'');
    if(leaveFilterType !== 'all' && t !== leaveFilterType) return false;
    if(leaveFilterStatus !== 'all' && (l.status||'') !== leaveFilterStatus) return false;
    return true;
  });
}, [sortedLeaves, targetYear, leaveFilterMonth, leaveFilterUser, leaveFilterType, leaveFilterStatus]);
const handleToggleEvent = (id) => { setSelectedEvents(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]); };
const handleToggleLeave = (id) => { setSelectedLeaves(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]); };
const toggleAllEvents = () => { if (selectedEvents.length === eventGroups.length) setSelectedEvents([]); else setSelectedEvents(eventGroups.map(g => g.id)); };
const toggleAllLeaves = () => { if (selectedLeaves.length === filteredLeaves.length) setSelectedLeaves([]); else setSelectedLeaves(filteredLeaves.map(l => l.id)); };
const openEditLeave = (l) => {
  if(!l) return;
  setEditTarget(l);
  setEditForm({
    type: normalizeOvertimeType(l.type||''),
    start: String(l.start||'').slice(0,16),
    end: String(l.end||'').slice(0,16),
    hours: Number(l.hours||0),
    reason: l.reason||'',
    status: l.status||'pending',
    deputyId: l.deputyId||''
  });
  setEditOpen(true);
};
const saveEditLeave = async () => {
  if(!editTarget) { alert("找不到可編輯的假單資料，請重新開啟視窗。"); return; }
  if(!editForm.type) { alert('請選擇假別'); return; }
  if(!editForm.start || !editForm.end) { alert('請填寫開始/結束'); return; }
  const hours = Number(editForm.hours||0);
  if(hours <= 0) { alert('時數必須大於 0'); return; }
  try {
    await crud.updateLeave(editTarget.id, {
      type: editForm.type,
      start: editForm.start,
      end: editForm.end,
      hours,
      reason: editForm.reason||'',
      status: editForm.status||'pending',
      deputyId: isOvertime(editForm.type) ? '' : (editForm.deputyId||''),
      editedAt: new Date()
    });
    alert('已更新資料');
    setEditOpen(false);
    setEditTarget(null);
  } catch(e){
    alert('更新失敗: ' + (e?.message || e));
  }
};

const handleDeleteSelected = async () => {
const targetIds = activeTab === 'events' ? selectedEvents : selectedLeaves;
if (targetIds.length === 0) return alert("請先勾選要刪除的資料！");
if (!confirm(`警告！您即將刪除 ${targetIds.length} 筆資料。\n刪除後無法復原，確定要繼續嗎？`)) return;
setIsProcessing(true);
try {

alert("選擇的資料已成功刪除！");

};
const handleExportYearly = () => {

} else {

if (yearLeaves.length === 0) return alert(`${targetYear}年度沒有假單資料可匯出。`);
csv = "\uFEFF申請人,假別,開始時間,結束時間,時數,狀態,紀錄ID\n";
yearLeaves.forEach(l => {

});}

link.click();
};

const confirm1 = confirm(`【極度危險操作】\n您即將刪除 ${targetYear} 年度的「所有${typeName}資料」共 ${itemsToDelete.length} 筆。\n強烈建議您先執行【匯出】作為備份。\n刪除後將無法復原，請問確定要繼續嗎？`);

setIsProcessing(true);
try {
if (activeTab === 'events') {
for (const gid of itemsToDelete) { await crud.deleteEventsByGroup(gid); }
} else {
for (const lid of itemsToDelete) { await crud.deleteLeave(lid); }}
alert(`${targetYear}年度 ${typeName}資料已全部清空！`);
if (activeTab === 'events') setSelectedEvents([]);
else setSelectedLeaves([]);
} catch (e) {
alert("刪除過程中發生錯誤: " + e.message);
} finally {
setIsProcessing(false);}
};
return (
<div className="max-w-5xl mx-auto space-y-6">

x-wrap">{g.items.length > 0 ? g.items.map((n, i) => <span key={i} className="bg-gray-200 px-2 py-0.5 rounded-full text-xs">{n}</span>) : '-'}</td><td className="p-3 text-xs text-gray-400 truncate max-w-[120px]" title={g.id}>{g.id}</td></tr>))}</tbody></table>) : (<div className="space-y-3">

            <input type="datetime-local" value={editForm.end} onChange={e=>setEditForm(f=>({...f,end:e.target.value}))} className="w-full border rounded px-3 py-2" />
          </div>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <div className="text-xs text-gray-500 mb-1">時數</div>
            <input type="number" step="0.5" value={editForm.hours} onChange={e=>setEditForm(f=>({...f,hours:e.target.value}))} className="w-full border rounded px-3 py-2" />
          </div>
          <div>
            <div className="text-xs text-gray-500 mb-1">職代(非加班才需要)</div>
            <input value={editForm.deputyId} onChange={e=>setEditForm(f=>({...f,deputyId:e.target.value}))} className="w-full border rounded px-3 py-2" />
          </div>
        </div>
        <div>
          <div className="text-xs text-gray-500 mb-1">事由</div>
          <textarea value={editForm.reason} onChange={e=>setEditForm(f=>({...f,reason:e.target.value}))} className="w-full border rounded px-3 py-2 min-h-[90px]" />
        </div>
      </div>
      <div className="px-5 py-4 border-t flex justify-end gap-2">
        <button onClick={()=>{setEditOpen(false); setEditTarget(null);}} className="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 font-bold">取消</button>
        <button onClick={saveEditLeave} className="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-bold">儲存</button>
      </div>
    </div>
  </div>
)}

</div></div></div>);}
function LoginScreen({ auth }) {
const [isLoggingIn, setIsLoggingIn] = useState(false);
const handleGoogleLogin = async () => {
  if (!auth) {
    alert("Firebase 尚未連線完成，請稍後再試。");
    return;
  }
  setIsLoggingIn(true);
  const provider = new GoogleAuthProvider();
  try {
    await signInWithPopup(auth, provider);
  } catch (error) {
    console.error("Google Sign-In Error", error);
    const code = String(error?.code || '');
    if (code === 'auth/unauthorized-domain') {
      const origin = (typeof window !== 'undefined' && window.location?.origin) ? window.location.origin : '';
      alert(
        `登入被中斷或發生錯誤，請重試。\n\n原因：目前網域尚未加入 Firebase 授權網域。\n目前網域：${origin || '未知'}\n\n請到 Firebase Console > Authentication > Settings > Authorized domains 加入此網域後再試。\n\n詳細訊息：${error?.message || code}`
      );
    } else {
      alert("登入被中斷或發生錯誤，請重試。\n詳細訊息: " + (error?.message || code || 'unknown error'));
    }
  } finally {
    setIsLoggingIn(false);
  }
};
return (<div className="min-h-screen bg-slate-100 flex items-center justify-center p-4"><div className="bg-white w-full max-w-sm p-8 rounded-xl shadow-lg text-center"><div className="w-16 h-16 bg-blue-600 rounded-xl mx-auto mb-4 flex items-center justify-center text-white"><Calendar size={32}/></div><h1 className="text-2xl font-bold text-gray-800 mb-1">差勤排班系統</h1><p className="text-gray-400 text-sm mb-8">高屏澎東職務再設計專案單位</p><div className="space-y-4"><button onClick={handleGoogleLogin} disabled={isLoggingIn} className="w-full py-3.5 rounded-lg font-bold bg-white border-2 border-gray-200 text-gray-700 transition-all flex items-center justify-center gap-3 hover:bg-gray-50 shadow-sm disabled:opacity-50">{isLoggingIn ? (<Loader2 className="animate-spin text-blue-600" size={20}/>) : (<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-5 h-5"/>)}<span>{isLoggingIn ? '正在驗證帳號...' : '使用 Google 帳號登入'}</span></button></div></div></div>);}
const root = createRoot(document.getElementById('root'));
root.render(<App />);</script></body></html>
